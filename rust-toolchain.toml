[toolchain]
# Bumped from 1.80 → stable: several transitive deps (time 0.3.47 needs 1.88,
# icu_collections 2.2.0 needs 1.86, etc.) outpace 1.80. Once we generate a
# Cargo.lock and pin a known-good set, this can pin a specific MSRV again.
channel = "stable"
components = ["rustfmt", "clippy"]
targets = ["x86_64-pc-windows-msvc"]
profile = "minimal"
